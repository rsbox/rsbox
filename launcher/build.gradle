plugins {
    id 'application'
}

run {
    group = 'rsbox'
    workingDir = rootProject.projectDir
    mainClassName = "io.rsbox.launcher.Launcher"
}

dependencies {
    implementation project(":common")
    implementation project(":cache")
    implementation project(":config")
    implementation project(":engine")
    implementation project(":net")

    implementation "io.guthix:jagex-store-5:_"
    implementation "io.guthix.oldscape:oldscape-cache:_"
}